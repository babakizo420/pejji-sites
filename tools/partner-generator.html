<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pejji Partner Image Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0D0D12;
      color: #E8E8ED;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 40px;
      align-items: start;
    }
    @media (max-width: 900px) {
      .container { grid-template-columns: 1fr; }
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #0A8F8F;
    }
    .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 32px;
    }
    .controls {
      background: #1A1A24;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 32px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #E8E8ED;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      background: #0D0D12;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 12px 16px;
      color: #E8E8ED;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: rgba(10, 143, 143, 0.5);
    }
    input::placeholder { color: #555; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #F57A1F;
      color: #fff;
      margin-bottom: 10px;
    }
    .btn-primary:hover { background: #e06a10; }
    .btn-secondary {
      background: rgba(10, 143, 143, 0.1);
      color: #0A8F8F;
      border: 1px solid rgba(10, 143, 143, 0.3);
      margin-bottom: 10px;
    }
    .btn-secondary:hover { background: rgba(10, 143, 143, 0.2); }
    .btn-whatsapp {
      background: rgba(34, 197, 94, 0.1);
      color: #22C55E;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }
    .btn-whatsapp:hover { background: rgba(34, 197, 94, 0.2); }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .wa-link-box {
      margin-top: 16px;
      background: #0D0D12;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #22C55E;
      word-break: break-all;
      user-select: all;
      line-height: 1.5;
    }
    .wa-link-label {
      font-size: 12px;
      color: #888;
      margin-top: 16px;
      margin-bottom: 6px;
    }
    .preview-wrapper {
      position: sticky;
      top: 40px;
    }
    .preview-label {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }
    .preview-frame {
      background: #1A1A24;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      justify-content: center;
    }
    canvas {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
    }
    .hint {
      font-size: 12px;
      color: #666;
      margin-top: -12px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <div style="max-width: 1200px; margin: 0 auto 24px;">
    <h1>Pejji Partner Image Generator</h1>
    <p class="subtitle">Internal tool - type a partner's name and tag, preview, and download as PNG.</p>
  </div>

  <div class="container">
    <div class="controls">
      <label for="partner-tag">Partner Tag</label>
      <input type="text" id="partner-tag" placeholder="e.g. ENIBA" autofocus maxlength="20">
      <p class="hint">This is what shows on the image and what referrals mention. Name, nickname, handle — anything.</p>

      <label for="phone-number">WhatsApp Number</label>
      <input type="text" id="phone-number" value="+234 800 000 0000" placeholder="+234 800 000 0000">

      <button class="btn btn-primary" id="btn-download">Download as PNG</button>
      <button class="btn btn-secondary" id="btn-copy">Copy Image to Clipboard</button>
      <button class="btn btn-whatsapp" id="btn-copy-wa">Copy WhatsApp Link</button>

      <p class="wa-link-label">Partner's WhatsApp referral link:</p>
      <div class="wa-link-box" id="wa-link"></div>
    </div>

    <div class="preview-wrapper">
      <p class="preview-label">Preview</p>
      <div class="preview-frame">
        <canvas id="canvas" width="1080" height="1920"></canvas>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const tagInput = document.getElementById('partner-tag');
    const phoneInput = document.getElementById('phone-number');
    const waLinkEl = document.getElementById('wa-link');

    function getWhatsAppLink() {
      const phone = phoneInput.value.replace(/[^\d]/g, '');
      const tag = (tagInput.value || '').replace(/[<>"'&]/g, '').trim() || 'CODE';
      return `wa.me/${phone}?text=Hi%20Pejji!%20I%20need%20a%20website.%20Code:%20${encodeURIComponent(tag)}`;
    }

    function updateWaLink() {
      waLinkEl.textContent = getWhatsAppLink();
    }

    function sanitize(str) {
      return str.replace(/[<>"'&]/g, '');
    }

    function drawImage() {
      const W = 1080;
      const H = 1920;
      const partnerTag = sanitize(tagInput.value) || 'TAG';
      const phone = sanitize(phoneInput.value) || '+234 800 000 0000';

      // Background gradient
      const grad = ctx.createLinearGradient(0, 0, W, H);
      grad.addColorStop(0, '#0D0D12');
      grad.addColorStop(1, '#1A1A24');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      // Decorative glow circles
      ctx.save();
      ctx.globalAlpha = 0.06;
      ctx.beginPath();
      ctx.arc(200, 400, 300, 0, Math.PI * 2);
      ctx.fillStyle = '#0A8F8F';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(900, 1500, 250, 0, Math.PI * 2);
      ctx.fillStyle = '#F57A1F';
      ctx.fill();
      ctx.restore();

      // === TOP: Pejji logo ===
      ctx.font = '700 72px "DM Sans", sans-serif';
      ctx.fillStyle = '#0A8F8F';
      ctx.textAlign = 'center';
      ctx.fillText('Pejji', W / 2, 360);

      // Accent line under logo
      const lineGrad = ctx.createLinearGradient(340, 0, 740, 0);
      lineGrad.addColorStop(0, '#0A8F8F');
      lineGrad.addColorStop(0.5, '#F57A1F');
      lineGrad.addColorStop(1, '#0A8F8F');
      ctx.fillStyle = lineGrad;
      roundRect(ctx, 340, 400, 400, 4, 2);
      ctx.fill();

      // === Headline ===
      ctx.font = '700 52px "DM Sans", sans-serif';
      ctx.fillStyle = '#E8E8ED';
      ctx.fillText('Your business deserves', W / 2, 560);
      ctx.fillText('a website that', W / 2, 625);
      ctx.fillStyle = '#F57A1F';
      ctx.fillText('works for you.', W / 2, 690);

      // === Partner tag — BIG and bold (the main identity) ===
      let tagFontSize = 120;
      ctx.font = `700 ${tagFontSize}px "DM Sans", sans-serif`;
      while (ctx.measureText(partnerTag).width > W - 160 && tagFontSize > 50) {
        tagFontSize -= 4;
        ctx.font = `700 ${tagFontSize}px "DM Sans", sans-serif`;
      }
      ctx.fillStyle = '#FFFFFF';
      ctx.fillText(partnerTag, W / 2, 880);

      // === "Pejji Partner" label ===
      ctx.font = '500 36px "DM Sans", sans-serif';
      ctx.fillStyle = '#0A8F8F';
      ctx.fillText('Pejji Partner', W / 2, 940);

      // === Divider ===
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      roundRect(ctx, 390, 1010, 300, 2, 1);
      ctx.fill();

      // === CTA ===
      ctx.font = '600 44px "DM Sans", sans-serif';
      ctx.fillStyle = '#FFFFFF';
      ctx.fillText('Fast. Secure. Beautiful.', W / 2, 1110);

      // === Starting from ===
      ctx.font = '400 36px "DM Sans", sans-serif';
      ctx.fillStyle = '#888888';
      ctx.fillText('Starting from \u20A660,000', W / 2, 1180);

      // === WhatsApp pill ===
      ctx.fillStyle = '#22C55E';
      roundRect(ctx, 250, 1290, 580, 90, 45);
      ctx.fill();
      ctx.font = '700 34px "DM Sans", sans-serif';
      ctx.fillStyle = '#FFFFFF';
      ctx.fillText('Chat on WhatsApp', W / 2, 1348);

      // === Phone ===
      ctx.font = '400 30px "DM Sans", sans-serif';
      ctx.fillStyle = '#888888';
      ctx.fillText(phone, W / 2, 1430);

      // === Instruction ===
      ctx.font = '400 26px "DM Sans", sans-serif';
      ctx.fillStyle = '#555555';
      ctx.fillText('Use code "' + partnerTag + '" when you message', W / 2, 1490);

      // === Bottom accent line ===
      ctx.fillStyle = lineGrad;
      roundRect(ctx, 340, 1580, 400, 4, 2);
      ctx.fill();

      // === pejji.com ===
      ctx.font = '400 28px "DM Sans", sans-serif';
      ctx.fillStyle = '#888888';
      ctx.fillText('pejji.com', W / 2, 1650);

      updateWaLink();
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    // Live preview on input
    tagInput.addEventListener('input', drawImage);
    phoneInput.addEventListener('input', drawImage);

    // Download
    document.getElementById('btn-download').addEventListener('click', () => {
      const tag = tagInput.value.trim() || 'tag';
      const link = document.createElement('a');
      link.download = `pejji-partner-${tag.toLowerCase()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    // Copy image to clipboard
    document.getElementById('btn-copy').addEventListener('click', async () => {
      try {
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        await navigator.clipboard.write([
          new ClipboardItem({ 'image/png': blob })
        ]);
        const btn = document.getElementById('btn-copy');
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = orig; }, 2000);
      } catch (err) {
        alert('Could not copy - try downloading instead.');
      }
    });

    // Copy WhatsApp link
    document.getElementById('btn-copy-wa').addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(getWhatsAppLink());
        const btn = document.getElementById('btn-copy-wa');
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = orig; }, 2000);
      } catch (err) {
        alert('Could not copy link.');
      }
    });

    // Initial draw
    drawImage();
  </script>
</body>
</html>
