name: Pejji Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: cd pejji-com && npm ci
      - name: Check for exposed secrets
        run: |
          echo "Scanning for exposed secrets..."
          FOUND=0
          if grep -rn --include="*.js" --include="*.ts" --include="*.astro" --include="*.jsx" --include="*.tsx" --include="*.html" \
            -E "(api[_-]?key|api[_-]?secret|password|passwd|secret[_-]?key|access[_-]?token)\s*[:=]\s*['\"][^'\"]{8,}" \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=dist . 2>/dev/null; then
            echo "::error::EXPOSED SECRETS DETECTED!"
            FOUND=1
          fi
          if find . -name ".env" -o -name ".env.local" -o -name ".env.production" | grep -v node_modules | grep -v .env.example | grep -q .; then
            echo "::error::Environment files found in repo!"
            FOUND=1
          fi
          if grep -rn --include="*.js" --include="*.ts" --include="*.astro" --include="*.html" \
            -E "(sk_live_|pk_live_|sk_test_|pk_test_|FLWSECK-|FLWPUBK-)" \
            --exclude-dir=node_modules --exclude-dir=.git . 2>/dev/null; then
            echo "::error::Payment keys detected in source!"
            FOUND=1
          fi
          if [ $FOUND -eq 1 ]; then exit 1; fi
          echo "No exposed secrets found."
      - name: Lint check
        run: |
          cd pejji-com
          if [ -f ".eslintrc.js" ] || [ -f ".eslintrc.json" ] || [ -f ".eslintrc.cjs" ] || [ -f "eslint.config.js" ]; then
            npx eslint . --max-warnings=0 || echo "::warning::Lint warnings found."
          else
            echo "No ESLint config found. Skipping."
          fi

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install and build
        run: cd pejji-com && npm ci && npm run build
      - name: Verify build output
        run: |
          if [ -d "pejji-com/dist" ]; then
            FILE_COUNT=$(find pejji-com/dist -type f | wc -l)
            echo "Build output: $FILE_COUNT files"
            if [ $FILE_COUNT -eq 0 ]; then echo "::error::Empty build!"; exit 1; fi
            if [ ! -f "pejji-com/dist/index.html" ]; then echo "::error::No index.html!"; exit 1; fi
          else
            echo "::error::No dist/ directory!"; exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: pejji-com/dist/
          retention-days: 3

  security:
    name: Pejji Security Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: cd pejji-com && npm ci
      - name: Dependency audit
        run: |
          cd pejji-com
          AUDIT_OUTPUT=$(npm audit --production 2>&1) || true
          echo "$AUDIT_OUTPUT"
          if echo "$AUDIT_OUTPUT" | grep -q "critical"; then
            echo "::error::CRITICAL vulnerabilities found!"
            exit 1
          fi
      - uses: actions/download-artifact@v4
        with:
          name: site-build
          path: pejji-com/dist/
      - name: Security header check
        run: |
          if [ -f "pejji-com/dist/_headers" ] || [ -f "pejji-com/public/_headers" ]; then
            HEADERS_FILE=$([ -f "pejji-com/dist/_headers" ] && echo "pejji-com/dist/_headers" || echo "pejji-com/public/_headers")
            MISSING=0
            for HEADER in "Content-Security-Policy" "X-Frame-Options" "X-Content-Type-Options" "Referrer-Policy" "Permissions-Policy"; do
              if grep -qi "$HEADER" "$HEADERS_FILE"; then
                echo "[PASS] $HEADER"
              else
                echo "[FAIL] Missing $HEADER"
                MISSING=$((MISSING + 1))
              fi
            done
            if [ $MISSING -gt 0 ]; then exit 1; fi
          else
            echo "::error::No _headers file found!"
            exit 1
          fi
      - name: Info disclosure check
        run: |
          if grep -rn --include="*.html" -i "stack trace\|stacktrace\|debug mode" pejji-com/dist/ 2>/dev/null; then
            echo "::error::Debug info in build output!"
            exit 1
          fi
          echo "No info disclosure found."
      - name: Demo site header check
        run: |
          echo "Checking demo site _headers files..."
          FAIL=0
          for DEMO in exports/extracted/*/; do
            HEADERS_FILE=$(find "$DEMO" -name "_headers" -type f 2>/dev/null | head -1)
            if [ -n "$HEADERS_FILE" ]; then
              echo "[PASS] $DEMO has _headers"
            else
              echo "[FAIL] $DEMO missing _headers"
              FAIL=1
            fi
          done
          if [ $FAIL -eq 1 ]; then echo "::error::Demo sites missing security headers!"; exit 1; fi
      - name: NDPA compliance check
        run: |
          echo "Checking NDPA compliance across all sites..."
          FAIL=0
          # Check pejji-com for cookie consent
          if grep -rq "cookie-consent\|cookie-banner" pejji-com/src/ 2>/dev/null; then
            echo "[PASS] pejji-com has cookie consent"
          else
            echo "[FAIL] pejji-com missing cookie consent"
            FAIL=1
          fi
          # Check all demo sites for cookie consent
          for DEMO in exports/extracted/*/; do
            INDEX=$(find "$DEMO" -name "index.html" -type f 2>/dev/null | head -1)
            if [ -n "$INDEX" ]; then
              NAME=$(basename "$DEMO")
              if grep -q "cookie-consent\|cookie-banner" "$INDEX" 2>/dev/null; then
                echo "[PASS] $NAME has cookie consent"
              else
                echo "[FAIL] $NAME missing cookie consent (NDPA non-compliant)"
                FAIL=1
              fi
              if grep -q "Content-Security-Policy" "$INDEX" 2>/dev/null; then
                echo "[PASS] $NAME has CSP meta tag"
              else
                echo "[FAIL] $NAME missing CSP meta tag"
                FAIL=1
              fi
            fi
          done
          if [ $FAIL -eq 1 ]; then echo "::error::NDPA compliance check failed! All sites must have cookie consent and CSP."; exit 1; fi
          echo "All sites NDPA compliant."

  performance:
    name: Performance Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: site-build
          path: pejji-com/dist/
      - name: Build size check
        run: |
          echo "Total: $(du -sh pejji-com/dist/ | cut -f1)"
          LARGE=$(find pejji-com/dist/ -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" \) -size +200k 2>/dev/null | wc -l)
          if [ "$LARGE" -gt 0 ]; then
            echo "::warning::$LARGE image(s) over 200KB. Consider WebP."
          fi

  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: [lint, build, security, performance]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - run: |
          echo "ALL GATES PASSED. Cloudflare Pages handles deployment on push to main."
